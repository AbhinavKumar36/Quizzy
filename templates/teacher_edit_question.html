{% extends 'base.html' %}

{% block title %}Edit Question | Quizzy{% endblock %}

{% block content %}
<div class="teacher-header fade-in-up">
    <div class="breadcrumb">
        <a href="{{ url_for('teacher_dashboard') }}">Dashboard</a> &gt; 
        <a href="{{ url_for('teacher_add_question', quiz_id=question.quiz_id) }}">Manage Questions</a> &gt; 
        Edit Question
    </div>
    <h1>Edit Question</h1>
</div>

<form action="{{ url_for('teacher_edit_question', question_id=question.id) }}" method="POST" class="teacher-form glass-panel fade-in-up delay-1">
    <div class="form-group">
        <label for="text">Question Text</label>
        <textarea id="text" name="text" class="glass-input" rows="3" required>{{ question.text }}</textarea>
    </div>

    <div class="options-inputs mt-1">
        <div class="form-group"><label>Option A</label><input type="text" name="option_a" class="glass-input" value="{{ question.option_a }}" required></div>
        <div class="form-group"><label>Option B</label><input type="text" name="option_b" class="glass-input" value="{{ question.option_b }}" required></div>
        <div class="form-group"><label>Option C</label><input type="text" name="option_c" class="glass-input" value="{{ question.option_c }}" required></div>
        <div class="form-group"><label>Option D</label><input type="text" name="option_d" class="glass-input" value="{{ question.option_d }}" required></div>
    </div>

    <div class="form-group mt-1">
        <label for="question_type">Question Type</label>
        <select id="question_type" name="is_multiple_choice" class="glass-input" onchange="toggleOptionType(this)">
            <option value="0" {% if not question.is_multiple_choice %}selected{% endif %}>Single Choice</option>
            <option value="1" {% if question.is_multiple_choice %}selected{% endif %}>Multiple Answers</option>
        </select>
    </div>

    <div class="form-group mt-1">
        <label>Select Correct Option(s)</label>
        <div class="options-inputs" style="margin-top: 0.5rem;" id="correct_options_container">
            {% set correct_opts = question.correct_option.split(',') %}
            <label style="background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 0.5rem; border-radius: 8px; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: white;"><input type="{% if question.is_multiple_choice %}checkbox{% else %}radio{% endif %}" name="correct_option" value="A" {% if not question.is_multiple_choice %}required{% endif %} {% if 'A' in correct_opts %}checked{% endif %}> A</label>
            <label style="background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 0.5rem; border-radius: 8px; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: white;"><input type="{% if question.is_multiple_choice %}checkbox{% else %}radio{% endif %}" name="correct_option" value="B" {% if not question.is_multiple_choice %}required{% endif %} {% if 'B' in correct_opts %}checked{% endif %}> B</label>
            <label style="background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 0.5rem; border-radius: 8px; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: white;"><input type="{% if question.is_multiple_choice %}checkbox{% else %}radio{% endif %}" name="correct_option" value="C" {% if not question.is_multiple_choice %}required{% endif %} {% if 'C' in correct_opts %}checked{% endif %}> C</label>
            <label style="background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 0.5rem; border-radius: 8px; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: white;"><input type="{% if question.is_multiple_choice %}checkbox{% else %}radio{% endif %}" name="correct_option" value="D" {% if not question.is_multiple_choice %}required{% endif %} {% if 'D' in correct_opts %}checked{% endif %}> D</label>
        </div>
    </div>

    <script>
    function toggleOptionType(select) {
        const container = document.getElementById('correct_options_container');
        const inputs = container.querySelectorAll('input');
        const isMulti = select.value === '1';
        
        inputs.forEach(input => {
            input.type = isMulti ? 'checkbox' : 'radio';
            if (isMulti) {
                input.removeAttribute('required');
            } else {
                input.setAttribute('required', 'required');
            }
        });
    }
    </script>

    <div class="form-actions mt-2">
        <a href="{{ url_for('teacher_add_question', quiz_id=question.quiz_id) }}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-accent">Save Changes</button>
    </div>
</form>
{% endblock %}
